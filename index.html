<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>‎ </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

#lockScreen{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loginBox{
    background:#222;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:320px;
}

.loginBox input{
    width:100%;
    padding:12px;
    margin:15px 0;
}

.loginBox button{
    width:100%;
}
.credit{
    position:fixed;
    top:24px;
    left:24px;
    color:rgba(255,255,255,.5);
    font-size:13px;
    font-weight:500;
    letter-spacing:.3px;
    z-index:100;
    user-select:none;
}

.credit em{
    font-style:italic;
    font-weight:600;
}
.date{
    margin-top:4px;
    font-size:11px;
    color:rgba(255,255,255,.5);
    font-weight:400;
}
#status{
    margin-top:15px;
    text-align:center;
    font-size:15px;
    opacity:0;
    transition:opacity .5s ease;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Figtree", sans-serif;
}
body{
	height:100vh;
	overflow:hidden;
	color:white;
}

.background{
    position:fixed;
    inset:0;

    background:linear-gradient(
        -45deg,	
        #000000
    );

    background-size:500% 500%;
    animation:gradient 15s ease infinite;
    z-index:-2;
}
@keyframes gradient{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}
.overlay{

	position:fixed;
	inset:0;
	background:rgba(0,0,0,0.6);
	backdrop-filter:blur(14px);
	z-index:-1;

}
.container{
	height:100%;
	display:flex;
	justify-content:space-between;
	align-items:center;
	padding:8%;
	gap:70px;
}

.left{
	flex:1;
}

.message{
    font-size:16px;
    line-height:1.2;
    max-width:650px;
}
	.right{
		width:430px;

}

.card{
	background:rgba(255,255,255,.08);
	border:1px solid rgba(255,255,255,.12);
	backdrop-filter:blur(20px);
	border-radius:22px;
	padding:25px;

box-shadow:0 15px 40px rgba(0,0,0,.35);
}
textarea{
width:100%;
height:200px;
padding:18px;
background:rgba(255,255,255,.08);
border:none;
border-radius:15px;
outline:none;
resize:none;
font-size:16px;
color:white;
}

textarea::placeholder{
color:rgba(255,255,255,.7);

}

button{
width:100%;
margin-top:18px;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#2196f3,#64b5f6);
color:white;
transition:.3s;
}

button:hover{
transform:translateY(-2px);

}

#status{
margin-top:15px;
text-align:center;
font-size:15px;
opacity:.8;

}

@media(max-width:900px){
.container{
flex-direction:column;
justify-content:center;
text-align:center;

}

.right{
width:100%;
max-width:450px;

}

.message{
font-size: 10px;

}

}

</style>
</head>
<body>
<div id="lockScreen">
    <div class="loginBox">
        <h2>whoRu</h2>
        <input type="password" id="password" placeholder="Password">
        <button onclick="unlock()">Enter</button>
<br></br>
        <p id="error"></p>
    </div>

</div>
<div class="credit">
    <div>made by <em>someone</em> </div>
    <div class="date" id="dateTime"></div>
</div>
<div class="background"></div>
<div class="overlay"></div>
<div class="container">
<div class="left">
<div class="message">

<img src="diary/final.png" alt="picture of us">
<br>
<p style="font-size: 10 px;">
i still miss you. i still regret what i did. i will be better, i just hope you love me again. :(

written on July 18, 2026, 12:03 PM. (just as you requested.)

</p>
</div>

</div>

<div class="right">

<div class="card">

<textarea
id="reply"
placeholder="send smt to me if u want :)"
></textarea>

<button onclick="sendReply()">

Send

</button>

<div id="status"></div>

</div>

</div>

</div>

<script>
function updateDateTime() {
    const now = new Date();

    const options = {
        month: "long",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
	second: "2-digit"
    };

    document.getElementById("dateTime").textContent =
        now.toLocaleString("en-US", options);
}

updateDateTime();
setInterval(updateDateTime, 1000);
const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbw8fP6xa4ep7zLg0fUj4CixoVi6hIaInJaFFqqqcqafbjrELbADi0L7r6tAJGptTePY/exec";

const PASSWORD = "091624";

function unlock(){
    const input = document.getElementById("password").value;

    if(input === PASSWORD){
        document.getElementById("lockScreen").style.display = "none";
    }else{
        document.getElementById("error").textContent = "Incorrect password.";
    }
}

async function sendReply() {

    const textarea = document.getElementById("reply");
    const status = document.getElementById("status");

    if (textarea.value.trim() === "") return;

    const formData = new FormData();
    formData.append("message", textarea.value);

    try {

        await fetch(WEB_APP_URL, {
            method: "POST",
            body: formData,
            mode: "no-cors"
        });

        textarea.value = "";

        status.textContent = "thank you for leaving ur thoughts :)";
        status.style.opacity = "1";

        setTimeout(() => {
            status.style.opacity = "0";

        }, 3000);

    } catch (err) {

        console.error(err);

        status.textContent = "Error sending message.";
        status.style.opacity = "1";

        setTimeout(() => {
            status.style.opacity = "0";

            setTimeout(() => {
                status.textContent = "";
            }, 500);

        }, 3000);
    }
}
</script>
</body>
</html>
