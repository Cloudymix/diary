<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance Checker</title>

<style>
body{
    font-family:Figtree,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
</style>
</head>
<body>

<div class="card">
    <h2>Attendance</h2>

    <input type="text" id="student" placeholder="Student Name">

    <input type="date" id="date">

    <label>
        <input type="checkbox" id="present">
        Present
    </label>

    <button onclick="submitAttendance()">
        Submit
    </button>

    <p id="status"></p>
</div>

<script>
async function submitAttendance(){

    if(!document.getElementById("present").checked){
        return;
    }

    const student =
        document.getElementById("student").value;

    const date =
        document.getElementById("date").value;

    const response = await fetch(
        "https://script.google.com/macros/s/AKfycbzuU0x2aofEnI64JJDupBD4OwUEoR49YsHR4_KwIBU66XmX5yQ7GY_ZAJ-TqVKTKbCCCA/exec",
        {
            method:"POST",
            body:JSON.stringify({
                student:student,
                date:date
            })
        }
    );

    document.getElementById("status")
        .textContent = "Attendance recorded!";
}
</script>

</body>
</html>
